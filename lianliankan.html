<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>连连看游戏</title>
    <link rel="stylesheet" href="lianliankan.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <h1>连连看游戏</h1>
        <div class="game-info">
            <div class="score">分数: <span id="score">0</span></div>
            <div class="timer">时间: <span id="timer">0</span>秒</div>
            <div class="game-controls">
                <button id="startBtn">开始游戏</button>
                <button id="restartBtn" class="hidden">重新开始</button>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="instructions">
            <p>电脑: 使用鼠标点击选择相同的图标</p>
            <p>手机: 使用触摸点击选择相同的图标</p>
        </div>
    </div>
    <script src="lianliankan.js"></script>
</body>
</html>
