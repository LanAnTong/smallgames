<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇游戏</title>
    <link rel="stylesheet" href="snake.css">
</head>
<body>
    <div class="container">
        <h1>贪吃蛇游戏</h1>
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="classic">经典模式</button>
            <button class="mode-btn" data-mode="loop">循环模式</button>
        </div>
        <div class="game-info">
            <div class="score">分数: <span id="score">0</span></div>
            <button class="history-icon" id="historyIcon" title="查看历史记录">📊</button>
            <div class="game-controls">
                <button id="startBtn">开始游戏</button>
                <button id="pauseBtn" class="hidden">暂停</button>
                <button id="resumeBtn" class="hidden">继续</button>
                <button id="restartBtn" class="hidden">重新开始</button>
            </div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="instructions">
            <p>电脑: 使用方向键或WASD控制</p>
            <p>手机: 使用下方方向按钮控制</p>
            <p id="modeDescription">经典模式：碰到墙壁或自己游戏结束</p>
        </div>
        <div class="touch-controls">
            <div class="control-row">
                <button class="control-btn" id="upBtn">▲</button>
            </div>
            <div class="control-row">
                <button class="control-btn" id="leftBtn">◀</button>
                <button class="control-btn" id="downBtn">▼</button>
                <button class="control-btn" id="rightBtn">▶</button>
            </div>
        </div>
        <!-- 历史记录弹窗 -->
        <div class="history-modal" id="historyModal">
            <div class="history-modal-content">
                <div class="history-modal-header">
                    <h2>历史分数 - <span id="historyModeTitle">经典模式</span></h2>
                    <button class="history-modal-close" id="historyModalClose">&times;</button>
                </div>
                <div class="history-modal-body">
                    <div class="history-list" id="historyList">
                        <p class="no-history">暂无历史记录</p>
                    </div>
                </div>
                <div class="history-modal-footer">
                    <button id="clearHistory" class="clear-btn">清除历史</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 自定义弹出框 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">提示</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <p>提示内容</p>
            </div>
            <div class="modal-footer" id="modalFooter">
                <button class="modal-btn modal-btn-primary" id="modalConfirm">确定</button>
                <button class="modal-btn modal-btn-secondary hidden" id="modalCancel">取消</button>
            </div>
        </div>
    </div>

    <script src="snake.js"></script>
</body>
</html>
