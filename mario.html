<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>马里奥冒险</title>
    <link rel="stylesheet" href="mario.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <h1>马里奥冒险</h1>
        <div class="game-info">
            <div class="score">分数: <span id="score">0</span></div>
            <div class="lives">生命: <span id="lives">3</span></div>
            <div class="game-controls">
                <button id="startBtn">开始游戏</button>
                <button id="restartBtn" class="hidden">重新开始</button>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="instructions">
            <p>电脑: 使用方向键或A/D移动，空格键跳跃</p>
            <p>手机: 使用下方按钮控制</p>
        </div>
        <div class="touch-controls">
            <div class="control-row">
                <button class="control-btn jump-btn" id="jumpBtn">跳跃</button>
            </div>
            <div class="control-row">
                <button class="control-btn" id="leftBtn">◀</button>
                <button class="control-btn" id="rightBtn">▶</button>
            </div>
        </div>
    </div>
    <script src="mario.js"></script>
</body>
</html>
